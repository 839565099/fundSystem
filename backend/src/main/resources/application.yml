server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: fund-system

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:192.168.1.20}:${DB_PORT:3306}/${DB_NAME:fund_system}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:R00t@qiyeanquan2018}
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        reset-enable: false
        login-username: ${DRUID_USERNAME:admin}
        login-password: ${DRUID_PASSWORD:changeme}

  redis:
    host: ${REDIS_HOST:192.168.1.20}
    port: ${REDIS_PORT:6378}
    password: ${REDIS_PASSWORD:}
    database: 0
    timeout: 10000
    lettuce:
      pool:
        max-active: 8
        max-wait: -1
        max-idle: 8
        min-idle: 0

  cache:
    type: redis
    redis:
      time-to-live: 300000

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.fund.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
    banner: false
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    call-setters-on-nulls: true
    jdbc-type-for-null: 'null'
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    root: info
    com.fund: debug
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'
  file:
    name: logs/fund-system.log
    max-size: 10MB
    max-history: 30

jwt:
  secret: ${JWT_SECRET:fundSystemSecretKey2024FundSystemSecretKey2024FundSystemSecretKey2024}
  expiration: 86400000
  header: Authorization
  prefix: Bearer

fund:
  api:
    eastmoney:
      base-url: https://fundgz.eastmoney.com
      detail-url: https://fund.eastmoney.com
    data-update-interval: 30000
    cache-expire: 300

# AI 助手配置（Claude）
ai:
  claude:
    api-key: ${AI_API_KEY:}
    base-url: ${AI_BASE_URL:https://cc.580ai.net}
    default-model: ${AI_MODEL:claude-sonnet-4-6}
    api-version: 2023-06-01
    max-tokens: 4096
    temperature: 0.7

  # 邮件配置
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    default-encoding: UTF-8

# 密码重置配置
password:
  reset:
    url: ${RESET_URL:http://localhost:3000/reset-password}
    expire-minutes: 30
